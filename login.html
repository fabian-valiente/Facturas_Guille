<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso · Sistema de Facturación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="auth.js"></script>
  <style>
    :root {
      --bg:          #F0EBE1;
      --surface:     #FDFAF6;
      --surface-2:   #F5F0E8;
      --border:      #E2D9CC;
      --border-hi:   #CBBFB0;
      --text:        #1C1814;
      --text-soft:   #6B6259;
      --text-muted:  #A8998C;
      --gold:        #B07D30;
      --gold-light:  #C9953E;
      --gold-glow:   rgba(176, 125, 48, 0.14);
      --danger:      #C0392B;
      --danger-bg:   rgba(192, 57, 43, 0.08);
      --shadow:      0 8px 48px rgba(100, 80, 50, 0.13);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Grain */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* Glow */
    body::after {
      content: "";
      position: fixed;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(176, 125, 48, 0.09) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* Header */
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
      opacity: 0.85;
    }

    .login-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 600;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 8px;
    }

    .login-title em {
      font-style: italic;
      color: var(--gold-light);
    }

    .login-sub {
      font-size: 12px;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .divider span {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider em {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--text-muted);
      text-transform: uppercase;
      font-style: normal;
    }

    /* Card */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      box-shadow: var(--shadow);
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 20px;
    }

    .label-text {
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .input-wrap {
      position: relative;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 11px 44px 11px 14px;
      font-size: 15px;
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      border: 1px solid var(--border-hi);
      border-radius: 7px;
      background: var(--surface-2);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.08em;
    }

    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.1);
      animation: shake 0.4s ease;
    }

    /* Toggle mostrar/ocultar */
    .toggle-vis {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .toggle-vis:hover { color: var(--gold); }

    /* Error message */
    .error-msg {
      font-size: 12px;
      color: var(--danger);
      margin-top: -14px;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 5px;
    }
    .error-msg.visible { display: flex; }

    /* Submit */
    .btn-login {
      width: 100%;
      padding: 13px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      color: #09090E;
      box-shadow: 0 4px 18px rgba(176, 125, 48, 0.22);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(176, 125, 48, 0.32);
    }

    .btn-login:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(9,9,14,0.25);
      border-top-color: #09090E;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .btn-icon { display: none; }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* Lock icon */
    .lock-badge {
      width: 44px;
      height: 44px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      color: var(--gold);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-wrap">

    <header class="login-header">
      <p class="login-eyebrow">Sistema de Facturación · Colombia</p>
      <h1 class="login-title">Cuenta <em>de Cobro</em></h1>
      <p class="login-sub">Acceso restringido · Guillermo Ortiz</p>
    </header>

    <div class="divider">
      <span></span><em>Autenticación</em><span></span>
    </div>

    <div class="login-card">

      <div class="lock-badge">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>

      <form id="loginForm" autocomplete="off">
        <label>
          <span class="label-text">Contraseña de acceso</span>
          <div class="input-wrap">
            <input
              type="password"
              id="passwordInput"
              placeholder="••••••••••••"
              autocomplete="current-password"
              autofocus
            />
            <button type="button" class="toggle-vis" id="toggleVis" tabindex="-1" title="Mostrar / ocultar">
              <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </label>

        <div class="error-msg" id="errorMsg">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Contraseña incorrecta. Intenta nuevamente.
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          <span class="btn-text">Ingresar al sistema</span>
          <div class="spinner"></div>
        </button>
      </form>

    </div>

    <p class="login-footer">Acceso protegido con PBKDF2 · SHA-256</p>

  </div>

  <script>
    // Si ya está autenticado, ir directo al sistema
    if (Auth.isAuthenticated()) {
      location.replace("index.html");
    }

    const form          = document.getElementById("loginForm");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn      = document.getElementById("loginBtn");
    const errorMsg      = document.getElementById("errorMsg");
    const toggleVis     = document.getElementById("toggleVis");
    const eyeIcon       = document.getElementById("eyeIcon");

    // Mostrar / ocultar contraseña
    toggleVis.addEventListener("click", () => {
      const isPass = passwordInput.type === "password";
      passwordInput.type = isPass ? "text" : "password";
      eyeIcon.innerHTML = isPass
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    });

    // Ocultar error cuando el usuario empieza a escribir
    passwordInput.addEventListener("input", () => {
      passwordInput.classList.remove("error");
      errorMsg.classList.remove("visible");
    });

    // Submit
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = passwordInput.value;
      if (!password) return;

      loginBtn.disabled = true;
      loginBtn.classList.add("loading");
      errorMsg.classList.remove("visible");

      try {
        const ok = await Auth.verify(password);
        if (ok) {
          Auth.setAuthenticated();
          location.replace("index.html");
        } else {
          passwordInput.classList.add("error");
          errorMsg.classList.add("visible");
          passwordInput.value = "";
          passwordInput.focus();
        }
      } catch (err) {
        console.error("Auth error:", err);
        errorMsg.textContent = "Error interno. Recarga la página.";
        errorMsg.classList.add("visible");
      } finally {
        loginBtn.disabled = false;
        loginBtn.classList.remove("loading");
      }
    });
  </script>

</body>
</html>
